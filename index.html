<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteBuilder AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--sf:#13131d;--sf2:#1c1c2e;--sf3:#252542;--bd:#2d2d50;--tx:#e0e0ff;--tx2:#8888aa;--ac:#6366f1;--ac2:#818cf8;--gn:#22c55e;--rd:#ef4444;--or:#f97316}
html,body{height:100%;overflow:hidden;font-family:system-ui,sans-serif;background:var(--bg);color:var(--tx)}

/* TOPBAR */
.top{height:44px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:6px}
.top .logo{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--ac),#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top input{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:4px 8px;color:var(--tx);font-size:12px;width:140px}
.top .sp{flex:1}
.top button,.tbtn{background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);padding:5px 10px;border-radius:5px;font-size:11px;cursor:pointer}
.top button:hover,.tbtn:hover{background:var(--sf3);color:var(--tx);border-color:var(--ac)}
.top .pri{background:var(--ac);border-color:var(--ac);color:#fff}
.top .grn{background:var(--gn);border-color:var(--gn);color:#fff}
.sep{width:1px;height:20px;background:var(--bd);margin:0 4px}

/* LAYOUT */
.main{display:flex;height:calc(100vh - 44px)}
.left{width:240px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.left .sb{padding:6px;border-bottom:1px solid var(--bd)}
.left .sb input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:5px 8px;color:var(--tx);font-size:11px}
.cats{flex:1;overflow-y:auto;padding:4px 0}
.cat-h{padding:5px 10px;font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;cursor:pointer;display:flex;justify-content:space-between}
.cat-h:hover{color:var(--tx)}
.cat-items{padding:0 5px 4px}
.cat-items.hid{display:none}
.ci{padding:4px 7px;border-radius:5px;font-size:11px;cursor:grab;display:flex;align-items:center;gap:6px;border:1px solid transparent}
.ci:hover{background:var(--sf2);border-color:var(--bd)}
.ci .ic{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px}

/* CANVAS */
.canvas-wrap{flex:1;overflow-y:auto;background:#f5f5f5;position:relative}
.canvas{max-width:1200px;margin:0 auto;min-height:100%;background:#fff;position:relative}
.canvas.tablet{max-width:768px}
.canvas.mobile{max-width:375px}
.comp{position:relative;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.comp:hover{border-color:#6366f166}
.comp.sel{border-color:var(--ac);box-shadow:0 0 0 2px #6366f133}
.comp-bar{display:none;position:absolute;top:-28px;right:0;background:var(--ac);border-radius:4px;padding:2px 4px;gap:2px;z-index:10}
.comp.sel .comp-bar{display:flex}
.comp-bar button{background:none;border:none;color:#fff;cursor:pointer;font-size:12px;padding:2px 4px;border-radius:3px}
.comp-bar button:hover{background:#ffffff33}

/* RIGHT */
.right{width:280px;background:var(--sf);border-left:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.rtabs{display:flex;border-bottom:1px solid var(--bd)}
.rtabs button{flex:1;padding:8px;background:none;border:none;border-bottom:2px solid transparent;color:var(--tx2);cursor:pointer;font-size:11px}
.rtabs button.act{color:var(--ac);border-bottom-color:var(--ac)}
.rpanel{flex:1;overflow-y:auto;padding:10px;display:none}
.rpanel.act{display:block}
.fg{margin-bottom:10px}
.fg label{font-size:10px;color:var(--tx2);display:block;margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:5px 7px;color:var(--tx);font-size:11px}
.fg textarea{height:60px;resize:vertical}

/* AI CHAT */
.msgs{flex:1;overflow-y:auto;padding:8px}
.msg{padding:7px 9px;border-radius:7px;margin-bottom:5px;font-size:11px;max-width:90%}
.msg.u{background:var(--ac);color:#fff;margin-left:auto}
.msg.a{background:var(--sf2)}
.chin{padding:6px;border-top:1px solid var(--bd);display:flex;gap:4px}
.chin input{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:6px 8px;color:var(--tx);font-size:11px}
.chin button{background:var(--ac);border:none;color:#fff;padding:6px 10px;border-radius:5px;cursor:pointer;font-size:11px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:#000a;z-index:999;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:12px;font-size:16px}
.modal .close{float:right;background:none;border:none;color:var(--tx2);font-size:18px;cursor:pointer}
.provider-card{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer}
.provider-card:hover{border-color:var(--ac)}
.provider-card.active{border-color:var(--gn);background:var(--sf3)}
.provider-card h4{font-size:13px;margin-bottom:4px}
.provider-card p{font-size:10px;color:var(--tx2)}
</style>
</head>
<body>

<div class="top">
  <div class="logo">⚡ SiteBuilder AI</div>
  <input id="projName" value="Мой сайт">
  <div class="sep"></div>
  <button onclick="undo()">↩</button>
  <button onclick="redo()">↪</button>
  <div class="sep"></div>
  <button onclick="saveProj()">💾</button>
  <button onclick="loadProj()">📂</button>
  <button class="grn" onclick="exportHTML()">📤 Export</button>
  <div class="sep"></div>
  <button onclick="setView('d')" id="vd">🖥</button>
  <button onclick="setView('t')" id="vt">📱</button>
  <button onclick="setView('m')" id="vm">📲</button>
  <div class="sep"></div>
  <button onclick="openSettings()">⚙️ AI</button>
  <div class="sp"></div>
  <button class="pri" onclick="openAIGen()">🤖 Сгенерировать</button>
</div>

<div class="main">
  <div class="left">
    <div class="sb"><input placeholder="Поиск компонентов..." id="searchInp" oninput="filterComps()"></div>
    <div class="cats" id="catList"></div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <div class="canvas" id="canvas"></div>
  </div>
  <div class="right">
    <div class="rtabs">
      <button class="act" onclick="rtab('props')">📋 Свойства</button>
      <button onclick="rtab('ai')">🤖 AI Чат</button>
    </div>
    <div class="rpanel act" id="pProps">
      <div id="noSel" style="text-align:center;color:var(--tx2);padding:30px">Выберите компонент</div>
      <div id="propFields" style="display:none"></div>
    </div>
    <div class="rpanel" id="pAI">
      <div class="msgs" id="chatMsgs">
        <div class="msg a">👋 Опишите сайт, и я соберу его из компонентов!</div>
      </div>
      <div class="chin">
        <input id="chatInp" placeholder="Опишите сайт..." onkeydown="if(event.key==='Enter')sendAI()">
        <button onclick="sendAI()">→</button>
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <button class="close" onclick="closeSettings()">✕</button>
    <h3>⚙️ Настройки AI</h3>
    <p style="font-size:11px;color:var(--tx2);margin-bottom:12px">Выберите провайдера нейросети. Без ключа работает встроенный движок.</p>
    <div id="providerList"></div>
    <div class="fg" style="margin-top:12px">
      <label>API Ключ (если нужен)</label>
      <input id="apiKeyInp" placeholder="Вставьте ключ...">
    </div>
    <div class="fg">
      <label>Модель</label>
      <select id="modelSel"></select>
    </div>
    <button class="tbtn" style="width:100%;margin-top:8px;background:var(--ac);color:#fff;border-color:var(--ac)" onclick="saveSettings()">Сохранить</button>
  </div>
</div>

<!-- AI Gen Modal -->
<div class="modal-bg" id="genModal">
  <div class="modal">
    <button class="close" onclick="closeGen()">✕</button>
    <h3>🤖 AI Генератор сайта</h3>
    <div class="fg">
      <label>Опишите какой сайт нужен</label>
      <textarea id="genDesc" placeholder="Например: Лендинг для кофейни с меню, отзывами и формой заказа"></textarea>
    </div>
    <div class="fg">
      <label>Стиль</label>
      <select id="genStyle">
        <option>Современный</option><option>Минимализм</option><option>Яркий</option><option>Корпоративный</option><option>Креативный</option>
      </select>
    </div>
    <button class="tbtn" style="width:100%;background:var(--ac);color:#fff;border-color:var(--ac)" onclick="generateSite()">⚡ Сгенерировать</button>
  </div>
</div>

  });
}

function filterComps() {
  const q = document.getElementById('searchInp').value.toLowerCase();
  document.querySelectorAll('.cat-items').forEach(list => {
    let any = false;
    list.querySelectorAll('.ci').forEach(ci => {
      const show = ci.textContent.toLowerCase().includes(q);
      ci.style.display = show ? '' : 'none';
      if (show) any = true;
    });
    list.previousElementSibling.style.display = any ? '' : 'none';
    list.classList.toggle('hid', !any && q !== '');
    if (any && q) list.classList.remove('hid');
  });
}

// ============ COMPONENTS ============
function addComp(typeId, idx) {
  saveUndo();
  const def = C.find(c => c.id === typeId);
  if (!def) return;
  const comp = { id: 'c' + (nextId++), type: typeId };
  if (idx !== undefined) comps.splice(idx, 0, comp);
  else comps.push(comp);
  render();
  selId = comp.id;
  render();
}

function removeComp(id) {
  saveUndo();
  comps = comps.filter(c => c.id !== id);
  if (selId === id) selId = null;
  render();
}

function moveComp(id, dir) {
  saveUndo();
  const i = comps.findIndex(c => c.id === id);
  if (i < 0) return;
  const ni = i + dir;
  if (ni < 0 || ni >= comps.length) return;
  [comps[i], comps[ni]] = [comps[ni], comps[i]];
  render();
}

function dupComp(id) {
  saveUndo();
  const i = comps.findIndex(c => c.id === id);
  if (i < 0) return;
  const nc = { id: 'c' + (nextId++), type: comps[i].type };
  comps.splice(i + 1, 0, nc);
  selId = nc.id;
  render();
}

// ============ RENDER ============
function render() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  if (comps.length === 0) {
    canvas.innerHTML = '<div style="padding:80px 40px;text-align:center;color:#999"><div style="font-size:48px;margin-bottom:16px">🎨</div><h2 style="color:#666">Перетащите компоненты сюда</h2><p style="margin-top:8px">Или используйте AI для генерации сайта</p></div>';
  }
  comps.forEach(comp => {
    const def = C.find(c => c.id === comp.type);
    if (!def) return;
    const wrap = document.createElement('div');
    wrap.className = 'comp' + (selId === comp.id ? ' sel' : '');
    wrap.dataset.id = comp.id;
    wrap.innerHTML = `<div class="comp-bar"><button onclick="event.stopPropagation();moveComp('${comp.id}',-1)" title="Вверх">▲</button><button onclick="event.stopPropagation();moveComp('${comp.id}',1)" title="Вниз">▼</button><button onclick="event.stopPropagation();dupComp('${comp.id}')" title="Дубликат">📋</button><button onclick="event.stopPropagation();removeComp('${comp.id}')" title="Удалить">🗑</button></div>${def.html()}`;
    wrap.onclick = (e) => { if(!e.target.closest('.comp-bar')){selId=comp.id;render();updateProps();} };
    canvas.appendChild(wrap);
  });
  // drop zone
  canvas.addEventListener('dragover', e => e.preventDefault());
  canvas.addEventListener('drop', e => {
    e.preventDefault();
    const cid = e.dataTransfer.getData('cid');
    if (cid) addComp(cid);
  });
  updateProps();
}

function updateProps() {
  const noSel = document.getElementById('noSel');
  const fields = document.getElementById('propFields');
  if (!selId) {
    noSel.style.display = '';
    fields.style.display = 'none';
    return;
  }
  noSel.style.display = 'none';
  fields.style.display = '';
  const comp = comps.find(c => c.id === selId);
  const def = C.find(c => c.id === comp?.type);
  fields.innerHTML = `<div class="fg"><label>Компонент</label><input value="${def?.name||''}" disabled></div><div class="fg"><label>Тип</label><input value="${comp?.type||''}" disabled></div><div class="fg"><label>ID</label><input value="${comp?.id||''}" disabled></div><p style="font-size:11px;color:var(--tx2);margin-top:12px">💡 Нажмите на текст в компоненте чтобы редактировать прямо на странице</p>`;
}

// ============ UNDO/REDO ============
function saveUndo() { undoStack.push(JSON.stringify(comps)); redoStack = []; }
function undo() { if(!undoStack.length)return; redoStack.push(JSON.stringify(comps)); comps=JSON.parse(undoStack.pop()); render(); }
function redo() { if(!redoStack.length)return; undoStack.push(JSON.stringify(comps)); comps=JSON.parse(redoStack.pop()); render(); }
document.addEventListener('keydown', e => {
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo();}
  if(e.key==='Delete'&&selId){removeComp(selId);}
});

async function generateSite() {
  const desc = document.getElementById('genDesc').value;
  if(!desc){alert('Опишите сайт!');return;}
  closeGen();
  
  if(settings.provider !== 'builtin' && settings.apiKey) {
    await generateWithAI(desc);
  } else {
    generateBuiltin(desc);
  }
}

function generateBuiltin(desc) {
  saveUndo();
  comps = [];
  nextId = 1;
  const lower = desc.toLowerCase();
  let matched = new Set();
  
  // Always start with header
  matched.add('header');
  matched.add('hero_cta');
  
  Object.entries(KEYWORDS).forEach(([key, words]) => {
    if(words.some(w => lower.includes(w))) {
      KEYWORD_TO_COMPS[key]?.forEach(c => matched.add(c));
    }
  });
  
  // Always add footer
  matched.add('footer_cols');
  
  // If nothing specific matched, add defaults
  if(matched.size <= 3) {
    ['features_grid','about','testimonials','contact_form'].forEach(c => matched.add(c));
  }
  
  // Order: nav, hero, content, sections, commerce, proof, forms, footer
  const order = ['header','sticky_nav','mega_menu','hero_cta','hero_full','hero_video','hero_slider','hero_form','features_grid','features_list','about','team','stats','steps','timeline','partners','product_grid','pricing','offer','cart','cta_banner','testimonials','reviews','client_logos','rating','gallery','video','slider','bot_cmd','bot_keyboard','bot_menu','ai_chat','ai_text','ai_img','ai_seo','whatsapp','tg_widget','faq','tabs','table','charts','analytics','contact_form','subscribe','order_form','login','map','social','calendar','weather','counter','footer_cols','footer_simple','footer_cta'];
  
  order.forEach(id => {
    if(matched.has(id)) {
      comps.push({id:'c'+(nextId++), type:id});
    }
  });
  
  render();
  alert('Сайт сгенерирован! ' + comps.length + ' компонентов');
}

async function generateWithAI(desc) {
  const compList = C.map(c => c.id).join(', ');
  const prompt = `Ты конструктор сайтов. Пользователь просит: "${desc}". Выбери подходящие компоненты из списка и верни ТОЛЬКО JSON массив их id в правильном порядке. Доступные id: ${compList}. Ответь ТОЛЬКО JSON массивом, например: ["header","hero_cta","footer_cols"]`;
  
  try {
    let result;
    if(settings.provider === 'groq') {
      const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.apiKey},
        body:JSON.stringify({model:settings.model,messages:[{role:'user',content:prompt}],temperature:0.3})
      });
      const d = await r.json();
      result = d.choices?.[0]?.message?.content;
    } else if(settings.provider === 'gemini') {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${settings.model}:generateContent?key=${settings.apiKey}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      });
      const d = await r.json();
      result = d.candidates?.[0]?.content?.parts?.[0]?.text;
    } else if(settings.provider === 'mistral') {
      const r = await fetch('https://api.mistral.ai/v1/chat/completions', {
        method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.apiKey},
        body:JSON.stringify({model:settings.model,messages:[{role:'user',content:prompt}]})
      });
      const d = await r.json();
      result = d.choices?.[0]?.message?.content;
    } else if(settings.provider === 'hf') {
      const r = await fetch(`https://api-inference.huggingface.co/models/${settings.model}`, {
        method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.apiKey},
        body:JSON.stringify({inputs:prompt,parameters:{max_new_tokens:500}})
      });
      const d = await r.json();
      result = d[0]?.generated_text || JSON.stringify(d);
    } else if(settings.provider === 'openrouter') {
      const r = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.apiKey},
        body:JSON.stringify({model:settings.model,messages:[{role:'user',content:prompt}]})
      });
      const d = await r.json();
      result = d.choices?.[0]?.message?.content;
    } else if(settings.provider === 'ollama') {
      const r = await fetch('http://localhost:11434/api/generate', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:settings.model,prompt,stream:false})
      });
      const d = await r.json();
      result = d.response;
    }
    
    if(result) {
      const match = result.match(/\[.*\]/s);
      if(match) {
        const ids = JSON.parse(match[0]);
        saveUndo();
        comps = [];
        nextId = 1;
        ids.forEach(id => {
          if(C.find(c => c.id === id)) {
            comps.push({id:'c'+(nextId++), type:id});
          }
        });
        render();
        alert('AI сгенерировал сайт! ' + comps.length + ' компонентов');
        return;
      }
    }
    alert('AI не смог разобрать ответ. Используем встроенный движок.');
    generateBuiltin(desc);
  } catch(e) {
    alert('Ошибка AI: ' + e.message + '. Используем встроенный движок.');
    generateBuiltin(desc);
  }
}

// ============ AI CHAT ============
function sendAI() {
  const inp = document.getElementById('chatInp');
  const msg = inp.value.trim();
  if(!msg) return;
  const msgs = document.getElementById('chatMsgs');
  msgs.innerHTML += `<div class="msg u">${msg}</div>`;
  inp.value = '';
  
  // Quick AI response
  setTimeout(() => {
    generateBuiltin(msg);
    msgs.innerHTML += `<div class="msg a">✅ Готово! Добавил компоненты по вашему описанию. Можете перетаскивать, удалять и добавлять новые.</div>`;
    msgs.scrollTop = msgs.scrollHeight;
  }, 500);
}
